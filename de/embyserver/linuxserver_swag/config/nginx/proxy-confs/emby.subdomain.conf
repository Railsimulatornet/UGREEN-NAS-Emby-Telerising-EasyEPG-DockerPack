## Custom Version 2026/01/06
# Emby (via docker bridge network)
# Wichtig: Emby läuft im gleichen Docker-Netz "emby_net", daher direkt per Containername erreichbar.

server {
    listen 8920 ssl;
    listen [::]:8920 ssl;
    http2 on;

    server_name emby.*;

    include /config/nginx/ssl.conf;

    client_max_body_size 0;

    location / {
        include /config/nginx/proxy.conf;

        # Direkter Proxy auf den Emby-Container (NICHT auf die Host-IP!)
        proxy_pass http://emby_embyserver:8096;

        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
    }
}
