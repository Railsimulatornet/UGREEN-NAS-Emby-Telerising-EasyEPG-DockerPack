x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

# Gemeinsame ENV für alle Container (wird aus .env interpoliert)
# Copyright Roman Glos 28.01.2026
x-common-env: &common-env
  TZ: "${TZ:-Europe/Berlin}"

networks:
  emby_net:
    driver: bridge

services:
  # ---------------------------------------------------------
  # Emby Media Server
  # ---------------------------------------------------------
  emby:
    image: emby/embyserver:latest
    container_name: emby_embyserver
    restart: always
    networks: [emby_net]

    # Intel iGPU / QSV (Hardware Transcoding)
    devices:
      - /dev/dri:/dev/dri

    environment:
      <<: *common-env
      UID: "${EMBY_UID:-1000}"
      GID: "${EMBY_GID:-10}"
      # Zusätzliche Gruppen-IDs (z.B. render/video/etc.)
      GIDLIST: "${EMBY_GIDLIST:-44,105}"
      UMASK: "${EMBY_UMASK:-002}"

    volumes:
      # Konfig / State
      - ${DOCKER_DIR:-/volume2/docker/embyserver}/emby/config:/config
      # Medien
      - ${MEDIA_DIR:-/volume1/Emby}:/mnt/Emby
      # Optional: separate Sicherungsablage (z.B. Backup & Restore Plugin)
      - ${EMBY_BACKUP_DIR:-/volume3/dockersich/EmbySicherung}:/mnt/EmbyBackup
      # "System"-Share (Plugins/Exports/sonstiges, je nach Setup)
      - ${EMBY_SYSTEM_DIR:-/volume2/EmbySystem}:/mnt/Embysystem
      # EasyEPG XML direkt in den Emby-Systempfad spiegeln
      - ${DOCKER_DIR:-/volume2/docker/embyserver}/takealug_new-easyepg/easyepg_xml:/mnt/Embysystem/EasyEPG

    ports:
      # Emby Web (HTTP): UI/API
      - "${EMBY_PORT_HTTP:-8096}:8096"

      # Emby Auto-Discovery im LAN (optional)
      # Wenn du Emby-Clients IMMER manuell per IP/DNS verbindest, kannst du das weglassen.
      - "${EMBY_PORT_DISCOVERY_UDP:-7359}:7359/udp"

      # Emby HTTPS (wenn Emby selbst TLS machen lässt) -> bei dir AUS, weil SWAG das übernimmt
      # - "${EMBY_PORT_HTTPS:-8920}:8920"

    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # ---------------------------------------------------------
  # SWAG (Reverse Proxy + Certbot + Fail2ban)
  # ---------------------------------------------------------
  swag:
    image: linuxserver/swag:latest
    container_name: emby_swag
    restart: always
    networks: [emby_net]

    environment:
      <<: *common-env
      PUID: "${PUID:-1000}"
      PGID: "${PGID:-10}"
      URL: "${SWAG_URL:-example.com}"
      SUBDOMAINS: "${SWAG_SUBDOMAINS:-emby}"
      ONLY_SUBDOMAINS: "${SWAG_ONLY_SUBDOMAINS:-true}"
      EMAIL: "${SWAG_EMAIL:-mail@example.com}"
      FAIL2BAN_ENABLED: "${SWAG_FAIL2BAN_ENABLED:-true}"

    volumes:
      - ${DOCKER_DIR:-/volume2/docker/embyserver}/linuxserver_swag/config:/config

    ports:
      # HTTP (extern frei wählbar) -> Container 80
      - "${SWAG_PORT_HTTP:-5080}:80"
      # HTTPS (extern frei wählbar) -> Container 443
      - "${SWAG_PORT_HTTPS:-50443}:443"
      # Custom: Emby-SSL Port (8920) am NAS -> SWAG (nginx listener)
      - "${SWAG_PORT_EMBY_SSL:-8920}:8920"
      # SWAG Dashboard (optional)
      - "${SWAG_PORT_DASH:-58080}:8080"

    cap_add:
      - NET_ADMIN
      - NET_RAW

    security_opt:
      - no-new-privileges:true

    depends_on:
      - emby

    logging: *default-logging
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # ---------------------------------------------------------
  # EasyEPG (EPG-Generator / XML Output)
  # ---------------------------------------------------------
  easyepg:
    image: railsimulatornet/new-easyepg:bs4fix
    container_name: emby_takealug_new-easyepg
    restart: always
    networks: [emby_net]

    environment:
      <<: *common-env
      USER_ID: "${USER_ID:-1000}"
      GROUP_ID: "${GROUP_ID:-10}"
      TIMEZONE: "${TZ:-Europe/Berlin}"
      UPDATE: "${EASYEPG_UPDATE:-yes}"
      REPO: "${EASYEPG_REPO:-script.service.easyepg-lite}"
      BRANCH: "${EASYEPG_BRANCH:-main}"
      PYTHONPATH: "${EASYEPG_PYTHONPATH:-/easyepg/pylibs}"

    volumes:
      - ${DOCKER_DIR:-/volume2/docker/embyserver}/takealug_new-easyepg/easyepg:/easyepg
      - ${DOCKER_DIR:-/volume2/docker/embyserver}/takealug_new-easyepg/easyepg_xml:/easyepg/xml

    ports:
      - "${EASYEPG_PORT:-4000}:4000"

    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # ---------------------------------------------------------
  # Telerising (TV Streams API)
  # ---------------------------------------------------------
  telerising-api:
    image: starfoxfs/telerising:latest
    container_name: telerising-api
    hostname: telerising
    restart: unless-stopped

    environment:
      <<: *common-env
      UID: "${TELERISING_UID:-1000}"
      GID: "${TELERISING_GID:-10}"
      UPDATE: "${TELERISING_UPDATE:-yes}"

    ports:
      - "${TELERISING_PORT:-5000}:5000"

    volumes:
      - ${DOCKER_DIR:-/volume2/docker/embyserver}/telerising:/telerising

    tmpfs:
      - /tmp
      - /var/log

    labels:
      - autoheal=true
      - com.centurylinklabs.watchtower.enable=true

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5000/api/zde/live/rtl2_deutschland.m3u8 | head -n 1 | grep -q '^#EXTM3U'"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s
